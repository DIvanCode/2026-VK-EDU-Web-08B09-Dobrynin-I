<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AskPupkin | Login</title>
    <link rel="icon" href="static/img/icon.png" type="image/png">
    <link rel="stylesheet" href="static/css/bootstrap.min.css">
    <link rel="stylesheet" href="static/css/styles.css">
  </head>
  <body>
    <header class="site-header sticky-top">
      <div class="container py-3">
        <div class="row g-3 align-items-center">
          <div class="col-12 col-xl-3">
            <a class="brand-link" href="index.html">
              <span>AskPupkin</span>
            </a>
          </div>
          <div class="col-12 col-md-7 col-xl-5">
            <form class="d-flex gap-2" action="index.html">
              <input class="form-control search-input" type="search" placeholder="Search">
              <button class="btn btn-outline-accent flex-shrink-0" type="submit">Search</button>
            </form>
          </div>
          <div class="col-12 col-md-5 col-xl-4">
            <div class="d-flex justify-content-xl-end gap-3">
              <a href="login.html">log in</a>
              <a href="signup.html">register</a>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="py-4 py-lg-5">
      <div class="container">
        <div class="row g-4">
          <div class="col-12 col-xl-8">
            <section class="form-shell">
              <h1 class="h2 mb-4">Log In</h1>
              <form action="index.html">
                <p class="text-danger mb-3">Sorry, wrong password!</p>
                <div class="row mb-3 align-items-start">
                  <div class="col-12 col-sm-3">
                    <label class="form-label mb-sm-0 pt-sm-2" for="login-name">Login</label>
                  </div>
                  <div class="col-12 col-sm-9">
                    <input id="login-name" class="form-control is-invalid" type="text" value="Enter your login here">
                    <div class="invalid-feedback d-block">Enter a valid login.</div>
                  </div>
                </div>
                <div class="row mb-4 align-items-start">
                  <div class="col-12 col-sm-3">
                    <label class="form-label mb-sm-0 pt-sm-2" for="login-pass">Password</label>
                  </div>
                  <div class="col-12 col-sm-9">
                    <input id="login-pass" class="form-control is-invalid" type="password" value="password">
                    <div class="invalid-feedback d-block">Password is incorrect.</div>
                  </div>
                </div>
                <div class="row">
                  <div class="col-12 col-sm-9 offset-sm-3">
                    <button class="btn btn-accent" type="submit">Log in!</button>
                    <div class="mt-3">
                      <a href="signup.html">create new account</a>
                    </div>
                  </div>
                </div>
              </form>
            </section>
          </div>

          <div class="col-12 col-xl-4">
            <div class="d-grid gap-4">
              <aside class="sidebar-card p-4">
                <h2 class="h5 mb-3">Popular tags</h2>
                <div class="tag-cloud">
                  <a href="tag.html">perl</a>
                  <a href="tag.html">python</a>
                  <a href="tag.html">TechnoPark</a>
                  <a href="tag.html">MySQL</a>
                  <a href="tag.html">django</a>
                  <a href="tag.html">Mail.Ru</a>
                  <a href="tag.html">Voloshin</a>
                  <a href="tag.html">Firefox</a>
                </div>
              </aside>

              <aside class="sidebar-card p-4">
                <h2 class="h5 mb-3">Best members</h2>
                <div class="member-list">
                  <div class="member-item"><a href="index.html">Mr. Freeman</a></div>
                  <div class="member-item"><a href="index.html">Dr. House</a></div>
                  <div class="member-item"><a href="index.html">Bender</a></div>
                  <div class="member-item"><a href="index.html">Queen Victoria</a></div>
                  <div class="member-item"><a href="index.html">V. Pupkin</a></div>
                </div>
              </aside>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer-shell py-4">
      <div class="container d-flex flex-column flex-md-row justify-content-between gap-2 muted-text">
        <span>Footer</span>
      </div>
  </body>
</html>
