{% extends "core/base.html" %}
{% load static %}

{% block title %}AskPupkin | Settings{% endblock %}

{% block content %}
  <section class="form-shell">
    <h1 class="h2 mb-4">Settings: {{ profile_user.nickname }}</h1>
    <form action="{% url 'core:profile' %}" enctype="multipart/form-data">
      <div class="row mb-3 align-items-start">
        <div class="col-12 col-sm-3">
          <label class="form-label mb-sm-0 pt-sm-2" for="settings-login">Login</label>
        </div>
        <div class="col-12 col-sm-9">
          <input id="settings-login" class="form-control" type="text" value="{{ profile_user.login }}">
          <div class="form-text">Login is used for sign in.</div>
        </div>
      </div>
      <div class="row mb-3 align-items-start">
        <div class="col-12 col-sm-3">
          <label class="form-label mb-sm-0 pt-sm-2" for="settings-email">Email</label>
        </div>
        <div class="col-12 col-sm-9">
          <input id="settings-email" class="form-control" type="email" value="{{ profile_user.email }}">
        </div>
      </div>
      <div class="row mb-3 align-items-start">
        <div class="col-12 col-sm-3">
          <label class="form-label mb-sm-0 pt-sm-2" for="settings-nickname">NickName</label>
        </div>
        <div class="col-12 col-sm-9">
          <input id="settings-nickname" class="form-control" type="text" value="{{ profile_user.nickname }}">
          <div class="form-text">Nickname is public.</div>
        </div>
      </div>
      <div class="row mb-3 align-items-start">
        <div class="col-12 col-sm-3">
          <label class="form-label mb-sm-0 pt-sm-2">Upload avatar</label>
        </div>
        <div class="col-12 col-sm-9">
          <div class="mb-3">
            <img class="avatar" src="{% if profile_user.avatar_url %}{{ profile_user.avatar_url }}{% else %}{% static 'img/avatar.png' %}{% endif %}" alt="avatar">
          </div>
          <div class="d-flex gap-2">
            <input class="form-control" type="text" value="{{ profile_user.avatar_path }}">
            <button class="btn btn-outline-accent" type="button">choose</button>
          </div>
          <div class="form-text">Upload JPG or PNG avatar.</div>
        </div>
      </div>
      <div class="row">
        <div class="col-12 col-sm-9 offset-sm-3">
          <button class="btn btn-accent" type="submit">Save</button>
        </div>
      </div>
    </form>
  </section>
{% endblock %}
