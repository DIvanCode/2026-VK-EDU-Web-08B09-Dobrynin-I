<nav class="mt-4" aria-label="{{ aria_label }}">
  <ul class="pagination mb-0 flex-wrap">
    {% for num in page_obj.paginator.page_range %}
      {% if num == page_obj.number %}
        <li class="page-item active"><span class="page-link">{{ num }}</span></li>
      {% else %}
        {% if page_url_arg %}
          <li class="page-item"><a class="page-link" href="{% url page_url_name page_url_arg %}?page={{ num }}">{{ num }}</a></li>
        {% else %}
          <li class="page-item"><a class="page-link" href="{% url page_url_name %}?page={{ num }}">{{ num }}</a></li>
        {% endif %}
      {% endif %}
    {% endfor %}
  </ul>
</nav>
